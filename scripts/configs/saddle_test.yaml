# configs/base.yaml
# Complete default configuration - single source of truth
# Every parameter used in training must be defined here

# Run metadata
meta:
  db_path: "datasets/results/multi_saddle_8.db"
  seed: 123
  output_dir: "neural_networks/output/saddle_test/trial29"
  run_id: "trial29"

# Data parameters
data:
  system_type: "saddle_system"
  val_size: 1000
  test_size: 1000

# Model architecture
model:
  num_states: 4
  hidden_dim: 32
  predictor_type: "standard"  # choices: standard, control_gate, bilinear
  value_method: null  # null = use system default
  
  # Target encoder settings
  use_target_encoder: true
  ema_decay: 0.5693270988066396
  
  # Gumbel softmax settings
  use_gumbel: true
  initial_temp: 4.078702903369505
  min_temp: 0.18065092801909782
  
  # Weight initialization
  encoder_init_method: "he"  # choices: xavier_uniform, xavier_normal, he, chaos, chaos2

# Training parameters
training:
  epochs: 75
  batch_size: 128
  checkpoint_every: 25
  
  # Optimizer settings
  optimizer_type: "adamw"  # choices: adam, adamw
  lr: 4.985819284806484e-05
  weight_decay: 0.04  # only used with adamw
  
  # Learning rate scheduling
  scheduler_type: "cosine"  # choices: cosine, warm_restarts, fixed
  min_lr: 4.985819284806484e-06
  use_warmup: true
  warmup_epochs: 10
  restart_period: 20  # for warm_restarts
  restart_mult: 1     # for warm_restarts

# Loss function configuration
loss:
  # Main loss weights
  state_loss_weight: 1.26598506946711
  value_loss_weight: 3.7314911815212897
  
  # Loss types
  state_loss_type: "mse"  # choices: kl_div, cross_entropy, mse, js_div
  value_loss_type: null      # null = use system default
  
  # Entropy regularization
  use_entropy_reg: true
  entropy_weight: 0.5818279714328523
  use_entropy_decay: true
  entropy_decay_proportion: 0.5