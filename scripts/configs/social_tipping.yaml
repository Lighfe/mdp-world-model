# configs/social_tipping.yaml
# Configuration for training DRM on social tipping system

# Run metadata
meta:
  db_path: "datasets/results/social_tipping_all_actions_tall.db"  # Update with your actual database path
  seed: 41
  output_dir: "neural_networks/output/social_tipping"
  run_id: "social_tipping_s41"

# Data parameters
data:
  system_type: "social_tipping"
  val_size: 1000
  test_size: 1000

# Model architecture
model:
  num_states: 4
  hidden_dim: 32
  predictor_type: "standard"  # choices: standard, control_gate, bilinear
  value_method: "abs_distance"  # choices: abs_distance, identity (from system_registry)
  
  # Target encoder settings
  use_target_encoder: true
  ema_decay: 0.66
  
  # Gumbel softmax settings
  use_gumbel: true
  initial_temp: 1.5
  min_temp: 0.25
  
  # Weight initialization
  encoder_init_method: "he"  # choices: xavier_uniform, xavier_normal, he, chaos, chaos2

# Training parameters
training:
  epochs: 100
  batch_size: 128
  checkpoint_every: 25
  
  # Optimizer settings
  optimizer_type: "adamw"  # choices: adam, adamw
  lr: 3.3e-4
  weight_decay: 0.017  # only used with adamw
  
  # Learning rate scheduling
  scheduler_type: "cosine"  # choices: cosine, warm_restarts, fixed
  min_lr: 3.3e-5
  use_warmup: true
  warmup_epochs: 10
  restart_period: 20  # for warm_restarts
  restart_mult: 1     # for warm_restarts

# Loss function configuration
loss:
  # Main loss weights
  state_loss_weight: 1.0
  value_loss_weight: 2.0
  
  # Loss types
  state_loss_type: "kl_div"  # choices: kl_div, cross_entropy, mse, js_div
  value_loss_type: "mse"  # mse for abs_distance value method
  
  # Entropy regularization
  use_entropy_reg: true
  entropy_weight: 0.6
  use_entropy_decay: true
  entropy_decay_proportion: 0.5