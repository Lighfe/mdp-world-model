# js_div + he
data:
  system_type: saddle_system
  test_size: 1000
  val_size: 1000
loss:
  entropy_decay_proportion: 0.5
  entropy_weight: 1.0
  state_loss_type: js_div
  state_loss_weight: 2.781419218353955
  use_entropy_decay: true
  use_entropy_reg: false
  value_loss_type: null
  value_loss_weight: 1.3563019417755633
meta:
  db_path: datasets/results/multi_saddle_8.db
  output_dir: neural_networks/output/test_subprocess
  run_id: test_batch
  seed: 42
model:
  ema_decay: 0.9928882513502881
  encoder_init_method: he
  hidden_dim: 32
  initial_temp: 3.1282170331021466
  min_temp: 0.3257092753375368
  num_states: 8
  predictor_type: standard
  use_gumbel: true
  use_target_encoder: true
  value_method: angle
training:
  batch_size: 128
  checkpoint_every: 25
  epochs: 60
  lr: 0.0004188124032458223
  min_lr: 4.188124032458223e-05
  optimizer_type: adamw
  restart_mult: 1
  restart_period: 20
  scheduler_type: cosine
  use_warmup: true
  warmup_epochs: 10
  weight_decay: 0.01
