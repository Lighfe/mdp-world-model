# cross entropy + xavier_uniform
data:
  system_type: saddle_system
  test_size: 1000
  val_size: 1000
loss:
  entropy_decay_proportion: 0.5
  entropy_weight: 0.6837850313851429
  state_loss_type: cross_entropy
  state_loss_weight: 1.5767100741347204
  use_entropy_decay: true
  use_entropy_reg: true
  value_loss_type: null
  value_loss_weight: 1.0925806805535219
meta:
  db_path: datasets/results/multi_saddle_8.db
  output_dir: neural_networks/output/test_subprocess
  run_id: test_batch
  seed: 42
model:
  ema_decay: 0.8414298219276155
  encoder_init_method: xavier_uniform
  hidden_dim: 32
  initial_temp: 1.6531973505931012
  min_temp: 0.19266897273422898
  num_states: 5
  predictor_type: standard
  use_gumbel: true
  use_target_encoder: true
  value_method: angle
training:
  batch_size: 128
  checkpoint_every: 25
  epochs: 85
  lr: 0.0005681988489401091
  min_lr: 5.681988489401091e-05
  optimizer_type: adamw
  restart_mult: 1
  restart_period: 20
  scheduler_type: cosine
  use_warmup: true
  warmup_epochs: 10
  weight_decay: 0.01
