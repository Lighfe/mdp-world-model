# mse + xavier uniform
data:
  system_type: saddle_system
  test_size: 1000
  val_size: 1000
loss:
  entropy_decay_proportion: 0.5
  entropy_weight: 0.6151081730367914
  state_loss_type: mse
  state_loss_weight: 2.938124015260816
  use_entropy_decay: true
  use_entropy_reg: true
  value_loss_type: null
  value_loss_weight: 1.3266885907760637
meta:
  db_path: datasets/results/multi_saddle_8.db
  output_dir: neural_networks/output/test_subprocess
  run_id: test_batch
  seed: 42
model:
  ema_decay: 0.885135371545281
  encoder_init_method: xavier_uniform
  hidden_dim: 32
  initial_temp: 2.037365924363021
  min_temp: 0.22524895631545516
  num_states: 4
  predictor_type: standard
  use_gumbel: true
  use_target_encoder: true
  value_method: angle
training:
  batch_size: 128
  checkpoint_every: 25
  epochs: 75
  lr: 0.0006842016383251799
  min_lr: 6.842016383251799e-05
  optimizer_type: adamw
  restart_mult: 1
  restart_period: 20
  scheduler_type: cosine
  use_warmup: true
  warmup_epochs: 10
  weight_decay: 0.01
